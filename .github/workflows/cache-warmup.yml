name: Refresh Cloudinary cache

on:
    schedule:
        # Daily — refresh the Cloudinary metadata cache that preview builds restore.
        # (Preview builds run Gatsby cold, so this no longer seeds a Gatsby build cache.)
        - cron: '0 6 * * *'
    workflow_dispatch:

concurrency:
    group: cache-warmup
    cancel-in-progress: true

env:
    NODE_OPTIONS: '--max_old_space_size=12288'

jobs:
    warm-cache:
        name: Refresh Cloudinary cache
        runs-on: depot-ubuntu-latest-8
        timeout-minutes: 45
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up pnpm
              uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

            - name: Set up Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Build cold (no Gatsby cache) purely to run onPreInit's Cloudinary crawl, which
            # writes .cloudinary-resources.json for preview builds to restore.
            - name: Build site
              run: pnpm build
              env:
                  GATSBY_MINIMAL: 'true'
                  # Provide Cloudinary creds so onPreInit crawls the resource list and writes
                  # .cloudinary-resources.json for preview builds to restore (cloud name comes
                  # from the committed .env.production).
                  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
                  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

            - name: Save Cloudinary metadata cache
              if: success()
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: .cloudinary-resources.json
                  key: cloudinary-${{ github.run_id }}
